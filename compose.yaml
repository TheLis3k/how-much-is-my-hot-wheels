services:
  mongodb:
    image: mongo:7.0
    container_name: hot-wheels-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - hot-wheels-net

  mongo-express:
    image: mongo-express
    container_name: hot-wheels-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USER}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/
      - ME_CONFIG_BASICAUTH=false
    networks:
      - hot-wheels-net
    depends_on:
      - mongodb

volumes:
  mongo-data:

networks:
  hot-wheels-net:
    driver: bridge